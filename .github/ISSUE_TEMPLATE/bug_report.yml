name: Bug Report
description: Report a reproducible problem in Taskplane
title: "bug: <short description>"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps so maintainers can reproduce.
      placeholder: |
        1. Run `...`
        2. Execute `/orch ...`
        3. Observe error `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste relevant output (`taskplane doctor`, command output, stack traces).
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Relevant Config
      description: Include safe snippets from `.pi/task-runner.yaml` / `.pi/task-orchestrator.yaml`.
      render: yaml

  - type: input
    id: taskplane-version
    attributes:
      label: Taskplane Version
      placeholder: e.g. 0.1.11

  - type: input
    id: pi-version
    attributes:
      label: pi Version
      placeholder: e.g. 0.57.1

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: e.g. 22.3.0

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11 / macOS 15 / Ubuntu 24.04

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I ran `taskplane doctor`
          required: false
        - label: I searched existing issues before filing
          required: false
        - label: I removed or redacted secrets from logs/config
          required: true
